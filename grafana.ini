#################################### Server ####################################
[server]
http_port = 3000
domain    = localhost
root_url  = http://localhost:3000

#################################### Security ##################################
[security]
# Désactive le login form natif Grafana → tout passe par Keycloak
disable_initial_admin_creation = false
allow_embedding               = true

#################################### Auth ##################################
[auth]
# Désactive le login/password local Grafana
# L'utilisateur NE PEUT PAS se connecter avec admin/admin
disable_login_form = true

# Si l'utilisateur n'est pas authentifié → redirect automatique vers Keycloak
# Sans cela, Grafana affiche sa propre page de login
oauth_auto_login = true

# Déconnexion Grafana → déconnecte aussi Keycloak (SSO logout)
signout_redirect_url = http://localhost:8080/realms/fleet-management/protocol/openid-connect/logout?post_logout_redirect_uri=http%3A%2F%2Flocalhost%3A3000&client_id=actia-app

#################################### Auth Generic OAuth ########################
[auth.generic_oauth]
enabled       = true
name          = Keycloak
icon          = signin
client_id     = actia-app
client_secret = 5YUBMrGI7kHJoF7mz5Ehgy6BTmW9cz9J

# Scopes OIDC — openid obligatoire pour récupérer id_token
scopes = openid profile email

# Endpoints Keycloak
auth_url     = http://localhost:8080/realms/fleet-management/protocol/openid-connect/auth
token_url    = http://localhost:8080/realms/fleet-management/protocol/openid-connect/token
api_url      = http://localhost:8080/realms/fleet-management/protocol/openid-connect/userinfo

# URL de callback Grafana après login Keycloak
redirect_uri = http://localhost:3000/login/generic_oauth

# Utilise le id_token (JWT) plutôt que userinfo endpoint → plus rapide
use_id_token = true

# Champs du token JWT → mapping vers Grafana
login_attribute_path    = preferred_username
name_attribute_path     = name
email_attribute_path    = email

# Mapping des rôles Keycloak → rôles Grafana
# Les rôles sont dans realm_access.roles dans le JWT Keycloak
role_attribute_path     = contains(realm_access.roles[*], 'admin') && 'Admin' || contains(realm_access.roles[*], 'editor') && 'Editor' || 'Viewer'
role_attribute_strict   = false

# Permet la création automatique des utilisateurs à la première connexion
allow_sign_up = true

# SSO : si l'utilisateur a déjà une session Keycloak active
# → Grafana le connecte sans redemander les credentials
use_pkce = true

#################################### Logging ###################################
[log]
mode  = console
level = info
